name: Docs

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Sphinx docs + gallery
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Set up headless display
        uses: pyvista/setup-headless-display-action@v4

      - name: Install system packages for OCCT-backed examples
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libglu1 libxft2 libxcursor-dev libxinerama1 \
            libocct-data-exchange-dev libocct-foundation-dev xvfb pandoc

      - name: Install with [docs]
        run: uv sync --extra docs

      - name: Build documentation
        run: uv run make -C doc html

      - name: Prevent Jekyll processing on GH Pages
        run: touch doc/_build/html/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc/_build/html/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  doctest:
    name: Doctest
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - uses: pyvista/setup-headless-display-action@v4
      - run: uv sync --extra docs
      - run: uv run make -C doc doctest
